name: Release

on:
  release:
    types: [published]

jobs:
  pack-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build
        working-directory: packages/mcp-gitlab
        run: |
          npm ci
          npm run build

      - name: Pack
        working-directory: packages/mcp-gitlab
        run: npm pack

      - name: Upload .tgz to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" packages/mcp-gitlab/*.tgz
